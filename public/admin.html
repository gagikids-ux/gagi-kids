<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin — Catálogo Gagi Kids</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--green:#075e54;--green2:#0a8c7e;--pink:#e91e8c;--blue:#1565c0;--red:#d32f2f;--gray:#f0f2f5;--border:#e0e0e0;--text:#111;--sub:#666}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--gray);color:var(--text);min-height:100vh}

/* ── HEADER ── */
.hdr{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hdr-left{display:flex;align-items:center;gap:10px}
.hdr h1{font-size:18px;font-weight:700}
.hdr-sub{font-size:12px;opacity:.75;margin-top:1px}
.btn-add{background:#fff;color:var(--green);border:none;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;white-space:nowrap}
.btn-add:hover{background:#e8f5e9}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 56px)}

/* ── SIDEBAR ── */
.sidebar{width:230px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);padding:16px;overflow-y:auto;position:sticky;top:56px;height:calc(100vh - 56px)}
.sidebar h3{font-size:11px;text-transform:uppercase;letter-spacing:.8px;color:var(--sub);margin:16px 0 8px;font-weight:600}
.sidebar h3:first-child{margin-top:0}
.search-box{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:20px;font-size:13px;outline:none;transition:.15s}
.search-box:focus{border-color:var(--green)}
.cb-label{display:flex;align-items:center;gap:8px;font-size:13px;padding:3px 0;cursor:pointer;color:#333}
.cb-label input{accent-color:var(--green);cursor:pointer}
.price-row{display:flex;gap:6px;align-items:center}
.price-in{width:80px;padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:12px;outline:none}
.price-in:focus{border-color:var(--green)}
.clear-btn{width:100%;margin-top:14px;padding:7px;border:1px solid var(--border);border-radius:8px;background:#fff;font-size:12px;color:var(--sub);cursor:pointer;transition:.15s}
.clear-btn:hover{border-color:var(--red);color:var(--red)}

/* ── MAIN ── */
.main{flex:1;padding:16px 20px;overflow:hidden}
.result-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.result-bar span{font-size:13px;color:var(--sub)}
.sort-sel{padding:6px 10px;border:1px solid var(--border);border-radius:20px;font-size:12px;color:#444;background:#fff;cursor:pointer;outline:none}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:14px}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.07);transition:transform .15s,box-shadow .15s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-2px);box-shadow:0 5px 16px rgba(0,0,0,.12)}
.card.unavailable{opacity:.5}
.card-img{height:150px;background:#f5ede6;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover}
.card-ph{width:56px;height:56px;opacity:.35}
.ready-badge{position:absolute;top:6px;right:6px;background:#00897b;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.unavail-badge{position:absolute;top:6px;left:6px;background:#b71c1c;color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.card-body{padding:10px 12px 12px;display:flex;flex-direction:column;gap:5px;flex:1}
.card-badges{display:flex;flex-wrap:wrap;gap:3px}
.badge{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:600;white-space:nowrap}
.b-cat{background:#e8f5e9;color:#2e7d32}
.b-girl{background:#fce4ec;color:var(--pink)}
.b-boy{background:#e3f2fd;color:var(--blue)}
.b-body{background:#f3e5f5;color:#7b1fa2}
.b-eyes{background:#fff3e0;color:#e65100}
.b-hair{background:#e8eaf6;color:#3949ab}
.card-name{font-size:13px;font-weight:700;line-height:1.3;color:#111}
.card-price{font-size:15px;font-weight:800;color:var(--green)}
.card-actions{display:flex;gap:6px;margin-top:6px}
.btn-edit,.btn-del{flex:1;padding:6px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.btn-edit{background:#e8f5e9;color:var(--green)}
.btn-edit:hover{background:#c8e6c9}
.btn-del{background:#ffebee;color:var(--red)}
.btn-del:hover{background:#ffcdd2}

.empty{grid-column:1/-1;text-align:center;padding:60px 20px;color:#aaa;font-size:15px}

/* ── DRAWER ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200}
.overlay.open{display:block}
.drawer{position:fixed;top:0;right:-540px;width:520px;max-width:100vw;height:100vh;background:#fff;z-index:201;box-shadow:-4px 0 24px rgba(0,0,0,.15);transition:right .25s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.drawer.open{right:0}
.drawer-hdr{background:linear-gradient(135deg,var(--green),var(--green2));color:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.drawer-hdr h2{font-size:16px;font-weight:700}
.drawer-close{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;line-height:1;opacity:.8}
.drawer-close:hover{opacity:1}
.drawer-body{flex:1;overflow-y:auto;padding:20px}
.drawer-footer{padding:16px 20px;border-top:1px solid var(--border);display:flex;gap:10px;flex-shrink:0}

/* ── FORM ── */
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:5px}
label{font-size:12px;font-weight:600;color:#444;text-transform:uppercase;letter-spacing:.4px}
.form-group input,.form-group select,.form-group textarea{padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;outline:none;transition:.15s;font-family:inherit;background:#fff;color:var(--text)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--green)}
.form-group textarea{resize:vertical;min-height:70px}
.radio-group{display:flex;flex-wrap:wrap;gap:8px}
.radio-pill{display:flex;align-items:center;gap:6px;padding:6px 12px;border:1.5px solid var(--border);border-radius:20px;cursor:pointer;font-size:13px;transition:.15s}
.radio-pill input{display:none}
.radio-pill.checked{border-color:var(--green);background:#e8f5e9;color:var(--green);font-weight:600}
.section-title{font-size:13px;font-weight:700;color:var(--green);margin:16px 0 10px;padding-bottom:6px;border-bottom:1.5px solid #e8f5e9}

/* ── PHOTO UPLOAD ── */
.photo-drop{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:.15s;position:relative}
.photo-drop:hover,.photo-drop.drag{border-color:var(--green);background:#f0faf8}
.photo-drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.photo-preview{width:100%;max-height:180px;object-fit:contain;border-radius:8px;display:none;margin-bottom:8px}
.photo-preview.show{display:block}
.photo-drop p{font-size:12px;color:var(--sub);margin-top:4px}
.photo-name{font-size:11px;color:var(--green);font-weight:600;margin-top:4px;word-break:break-all}

/* ── BUTTONS ── */
.btn{padding:10px 22px;border-radius:10px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
.btn-primary{background:var(--green);color:#fff;flex:1}
.btn-primary:hover{background:#054d44}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-secondary{background:#f5f5f5;color:#555;border:1px solid var(--border)}
.btn-secondary:hover{background:#eee}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#323232;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:300;transition:transform .25s;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

@media(max-width:700px){
  .sidebar{display:none}
  .layout{display:block}
  .grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr))}
  .drawer{width:100vw}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div>
      <div class="hdr h1" style="display:flex;align-items:center;gap:8px">
        <svg width="28" height="28" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="13" r="9" fill="white" opacity=".9"/><ellipse cx="20" cy="31" rx="12" ry="8" fill="white" opacity=".9"/><circle cx="17" cy="12" r="1.5" fill="#075e54"/><circle cx="23" cy="12" r="1.5" fill="#075e54"/><path d="M17 16.5Q20 19 23 16.5" stroke="#075e54" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
        Gagi Kids — Admin
      </div>
      <div class="hdr-sub" id="hdrCount"></div>
    </div>
  </div>
  <button class="btn-add" onclick="openDrawer()">+ Novo Produto</button>
</div>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <input class="search-box" type="text" placeholder="Buscar por nome..." id="searchIn" oninput="applyFilters()"/>

    <h3>Sexo</h3>
    <label class="cb-label"><input type="checkbox" id="fGirl" onchange="applyFilters()"> Menina</label>
    <label class="cb-label"><input type="checkbox" id="fBoy"  onchange="applyFilters()"> Menino</label>

    <h3>Tipo de corpo</h3>
    <label class="cb-label"><input type="checkbox" value="pano"         class="fBody" onchange="applyFilters()"> Cabeça/membros silicone, corpo de tecido</label>
    <label class="cb-label"><input type="checkbox" value="vinil_completo" class="fBody" onchange="applyFilters()"> Corpo inteiro de silicone vinil</label>
    <label class="cb-label"><input type="checkbox" value="solido"       class="fBody" onchange="applyFilters()"> Silicone sólido 100%</label>

    <h3>Olhos</h3>
    <label class="cb-label"><input type="checkbox" value="abertos"  class="fEyes" onchange="applyFilters()"> Abertos</label>
    <label class="cb-label"><input type="checkbox" value="fechados" class="fEyes" onchange="applyFilters()"> Fechados</label>

    <h3>Cabelo</h3>
    <label class="cb-label"><input type="checkbox" value="implantado" class="fHair" onchange="applyFilters()"> Implantado fio a fio</label>
    <label class="cb-label"><input type="checkbox" value="pintado"    class="fHair" onchange="applyFilters()"> Pintado</label>
    <label class="cb-label"><input type="checkbox" value="sem_cabelo" class="fHair" onchange="applyFilters()"> Sem cabelo</label>

    <h3>Faixa de preço</h3>
    <div class="price-row">
      <input class="price-in" type="number" id="priceMin" placeholder="Min" oninput="applyFilters()"/>
      <span style="color:#aaa;font-size:12px">—</span>
      <input class="price-in" type="number" id="priceMax" placeholder="Max" oninput="applyFilters()"/>
    </div>

    <h3>Categoria</h3>
    <div id="catFilters"></div>

    <h3>Status</h3>
    <label class="cb-label"><input type="checkbox" id="fAvail"   onchange="applyFilters()"> Disponível</label>
    <label class="cb-label"><input type="checkbox" id="fReady"   onchange="applyFilters()"> Pronta entrega</label>
    <label class="cb-label"><input type="checkbox" id="fUnavail" onchange="applyFilters()"> Indisponível</label>

    <button class="clear-btn" onclick="clearFilters()">Limpar filtros</button>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="result-bar">
      <span id="resultCount"></span>
      <select class="sort-sel" id="sortSel" onchange="applyFilters()">
        <option value="">Ordenar por</option>
        <option value="name">Nome A–Z</option>
        <option value="price_asc">Menor preço</option>
        <option value="price_desc">Maior preço</option>
        <option value="cat">Categoria</option>
      </select>
    </div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<!-- OVERLAY + DRAWER -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-hdr">
    <h2 id="drawerTitle">Novo Produto</h2>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body">
    <input type="hidden" id="fId"/>

    <div class="section-title">Foto</div>
    <div class="photo-drop" id="photoDrop">
      <input type="file" accept="image/*" id="photoFile" onchange="handlePhotoSelect(this)"/>
      <img class="photo-preview" id="photoPreview" src="" alt=""/>
      <p id="photoHint">Clique ou arraste uma foto aqui</p>
      <div class="photo-name" id="photoName"></div>
    </div>
    <input type="hidden" id="fPhoto"/>

    <div class="section-title">Identificação</div>
    <div class="form-grid">
      <div class="form-group form-full">
        <label>Nome do produto</label>
        <input type="text" id="fName" placeholder="Ex: Bebê Reborn Aurora"/>
      </div>
      <div class="form-group">
        <label>Categoria</label>
        <select id="fCategory">
          <option value="PROMOÇÃO">PROMOÇÃO</option>
          <option value="INTERMEDIÁRIO">INTERMEDIÁRIO</option>
          <option value="PREMIUM VINIL">PREMIUM VINIL</option>
          <option value="SÓLIDO SILICONE">SÓLIDO SILICONE</option>
          <option value="SÓLIDO PREMIUM">SÓLIDO PREMIUM</option>
        </select>
      </div>
      <div class="form-group">
        <label>Preço (R$)</label>
        <input type="number" id="fPrice" placeholder="380"/>
      </div>
      <div class="form-group">
        <label>Exibição do preço</label>
        <input type="text" id="fPriceDisplay" placeholder="R$ 380,00 (era R$ 400,00)"/>
      </div>
    </div>

    <div class="section-title">Sexo</div>
    <div class="radio-group" id="sexGroup">
      <label class="radio-pill" data-val="Menina"><input type="radio" name="sex" value="Menina"> Menina</label>
      <label class="radio-pill" data-val="Menino"><input type="radio" name="sex" value="Menino"> Menino</label>
    </div>

    <div class="section-title">Características físicas</div>
    <div class="form-grid">
      <div class="form-group">
        <label>Tamanho</label>
        <input type="text" id="fSize" placeholder="~45 cm"/>
      </div>
      <div class="form-group">
        <label>Peso</label>
        <input type="text" id="fWeight" placeholder="~0,8 kg"/>
      </div>
    </div>

    <div class="form-group" style="margin-top:10px">
      <label>Tipo de corpo</label>
      <select id="fBodyType">
        <option value="pano">Cabeça e membros de silicone, corpo de tecido</option>
        <option value="vinil_completo">Corpo inteiro de silicone vinil</option>
        <option value="solido">Silicone sólido 100% (pode dar banho)</option>
      </select>
    </div>

    <div style="margin-top:12px">
      <label style="font-size:12px;font-weight:600;color:#444;text-transform:uppercase;letter-spacing:.4px">Olhos</label>
      <div class="radio-group" id="eyesGroup" style="margin-top:8px">
        <label class="radio-pill" data-val="abertos"><input type="radio" name="eyes" value="abertos"> Abertos</label>
        <label class="radio-pill" data-val="fechados"><input type="radio" name="eyes" value="fechados"> Fechados</label>
      </div>
    </div>

    <div style="margin-top:12px">
      <label style="font-size:12px;font-weight:600;color:#444;text-transform:uppercase;letter-spacing:.4px">Cabelo</label>
      <div class="radio-group" id="hairGroup" style="margin-top:8px">
        <label class="radio-pill" data-val="implantado"><input type="radio" name="hair" value="implantado"> Implantado fio a fio</label>
        <label class="radio-pill" data-val="pintado"><input type="radio" name="hair" value="pintado"> Pintado</label>
        <label class="radio-pill" data-val="sem_cabelo"><input type="radio" name="hair" value="sem_cabelo"> Sem cabelo</label>
      </div>
    </div>

    <div class="section-title">Detalhes</div>
    <div class="form-grid">
      <div class="form-group form-full">
        <label>Aparência / Descrição</label>
        <textarea id="fDescription" placeholder="Pele clara, olhos fechados, expressão serena..."></textarea>
      </div>
      <div class="form-group form-full">
        <label>O que inclui</label>
        <textarea id="fIncludes" placeholder="Roupinha, fralda, chupeta, mamadeira, certidão de nascimento"></textarea>
      </div>
      <div class="form-group form-full">
        <label>Observações</label>
        <textarea id="fNotes" placeholder="Promoção, diferenciais, informações extras..."></textarea>
      </div>
    </div>

    <div class="section-title">Status</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <label class="cb-label"><input type="checkbox" id="fAvailable"> Disponível para venda</label>
      <label class="cb-label"><input type="checkbox" id="fReadyStock"> Pronta entrega (estoque físico)</label>
    </div>
  </div>
  <div class="drawer-footer">
    <button class="btn btn-secondary" onclick="closeDrawer()">Cancelar</button>
    <button class="btn btn-primary" id="saveBtn" onclick="saveProduct()">Salvar produto</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BODY_LABELS = {pano:'Corpo de tecido',vinil_completo:'Vinil completo',solido:'Sólido 100%'}
const HAIR_LABELS = {implantado:'Implantado',pintado:'Pintado',sem_cabelo:'Sem cabelo'}
const EYE_LABELS  = {abertos:'Olhos abertos',fechados:'Olhos fechados'}
const CAT_COLORS  = {'PROMOÇÃO':'#e65100','INTERMEDIÁRIO':'#1565c0','PREMIUM VINIL':'#6a1b9a','SÓLIDO SILICONE':'#2e7d32','SÓLIDO PREMIUM':'#c62828'}
const STORAGE_URL = 'https://ctotcetfqzpdvdvwzyei.supabase.co/storage/v1/object/public/imagens'

let ALL = []
let uploadedFilename = ''

// ── LOAD ──
async function load() {
  const data = await fetch('/api/catalog').then(r=>r.json())
  ALL = data.products || []

  // category filter checkboxes
  const cats = [...new Set(ALL.map(p=>p.category))]
  document.getElementById('catFilters').innerHTML = cats.map(c=>
    `<label class="cb-label"><input type="checkbox" value="${c}" class="fCat" onchange="applyFilters()"> ${c}</label>`
  ).join('')

  document.getElementById('hdrCount').textContent = `${ALL.length} produtos no catálogo`
  applyFilters()
}

// ── FILTER + RENDER ──
function applyFilters() {
  const q       = document.getElementById('searchIn').value.toLowerCase().trim()
  const girl    = document.getElementById('fGirl').checked
  const boy     = document.getElementById('fBoy').checked
  const bodies  = [...document.querySelectorAll('.fBody:checked')].map(e=>e.value)
  const eyesF   = [...document.querySelectorAll('.fEyes:checked')].map(e=>e.value)
  const hairF   = [...document.querySelectorAll('.fHair:checked')].map(e=>e.value)
  const cats    = [...document.querySelectorAll('.fCat:checked')].map(e=>e.value)
  const minP    = parseFloat(document.getElementById('priceMin').value) || 0
  const maxP    = parseFloat(document.getElementById('priceMax').value) || Infinity
  const avail   = document.getElementById('fAvail').checked
  const ready   = document.getElementById('fReady').checked
  const unavail = document.getElementById('fUnavail').checked
  const sort    = document.getElementById('sortSel').value

  let list = ALL.filter(p => {
    if (q && !p.name.toLowerCase().includes(q)) return false
    if (girl && !boy && p.sex !== 'Menina') return false
    if (boy  && !girl && p.sex !== 'Menino') return false
    if (bodies.length && !bodies.includes(p.bodyType)) return false
    if (eyesF.length  && !eyesF.includes(p.eyes))     return false
    if (hairF.length  && !hairF.includes(p.hair))      return false
    if (cats.length   && !cats.includes(p.category))   return false
    if (p.price < minP || p.price > maxP)              return false
    if (avail   && !p.available)  return false
    if (ready   && !p.readyStock) return false
    if (unavail && p.available)   return false
    return true
  })

  if (sort === 'name')       list.sort((a,b)=>a.name.localeCompare(b.name))
  if (sort === 'price_asc')  list.sort((a,b)=>a.price - b.price)
  if (sort === 'price_desc') list.sort((a,b)=>b.price - a.price)
  if (sort === 'cat')        list.sort((a,b)=>a.category.localeCompare(b.category))

  renderGrid(list)
  document.getElementById('resultCount').textContent = `Mostrando ${list.length} de ${ALL.length} produtos`
}

function clearFilters() {
  document.getElementById('searchIn').value = ''
  document.querySelectorAll('.sidebar input[type=checkbox]').forEach(e=>e.checked=false)
  document.getElementById('priceMin').value = ''
  document.getElementById('priceMax').value = ''
  applyFilters()
}

function renderGrid(list) {
  const grid = document.getElementById('grid')
  if (!list.length) { grid.innerHTML = '<div class="empty">Nenhum produto encontrado com esses filtros.</div>'; return }

  grid.innerHTML = list.map(p => {
    const catColor = CAT_COLORS[p.category] || '#555'
    const sexBadge = p.sex === 'Menina'
      ? '<span class="badge b-girl">Menina</span>'
      : '<span class="badge b-boy">Menino</span>'
    const photo = p.photo
      ? `<img src="${STORAGE_URL}/${p.photo}" alt="${p.name}" onerror="this.style.display='none';this.nextSibling.style.display='flex'"/><div class="card-ph" style="display:none">${placeholderSvg()}</div>`
      : `<div class="card-ph">${placeholderSvg()}</div>`

    return `<div class="card ${p.available?'':'unavailable'}">
      <div class="card-img" style="border-top:3px solid ${catColor}">
        ${photo}
        ${p.readyStock ? '<span class="ready-badge">PRONTA ENTREGA</span>' : ''}
        ${!p.available ? '<span class="unavail-badge">INDISPONÍVEL</span>' : ''}
      </div>
      <div class="card-body">
        <div class="card-badges">
          <span class="badge b-cat" style="background:${catColor}18;color:${catColor}">${p.category}</span>
          ${sexBadge}
          <span class="badge b-body">${BODY_LABELS[p.bodyType]||p.bodyType}</span>
          <span class="badge b-eyes">${EYE_LABELS[p.eyes]||p.eyes}</span>
          <span class="badge b-hair">${HAIR_LABELS[p.hair]||p.hair}</span>
        </div>
        <div class="card-name">${p.name}</div>
        <div class="card-price">${p.priceDisplay || 'R$ '+p.price.toFixed(2).replace('.',',')}</div>
        <div class="card-actions">
          <button class="btn-edit" onclick="openDrawer('${p.id}')">Editar</button>
          <button class="btn-del"  onclick="deleteProduct('${p.id}','${p.name.replace(/'/g,"\\'")}')">Excluir</button>
        </div>
      </div>
    </div>`
  }).join('')
}

function placeholderSvg() {
  return `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:56px;height:56px;opacity:.3"><circle cx="32" cy="22" r="13" fill="#a0897a"/><ellipse cx="32" cy="50" rx="18" ry="12" fill="#a0897a"/><circle cx="27" cy="21" r="2" fill="#5a3a2a"/><circle cx="37" cy="21" r="2" fill="#5a3a2a"/><path d="M28 27 Q32 31 36 27" stroke="#c49a8a" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>`
}

// ── DRAWER ──
function openDrawer(id) {
  uploadedFilename = ''
  const p = id ? ALL.find(x=>x.id===id) : null
  document.getElementById('drawerTitle').textContent = p ? 'Editar Produto' : 'Novo Produto'
  document.getElementById('fId').value         = p?.id || ''
  document.getElementById('fName').value        = p?.name || ''
  document.getElementById('fCategory').value    = p?.category || 'PROMOÇÃO'
  document.getElementById('fPrice').value       = p?.price || ''
  document.getElementById('fPriceDisplay').value= p?.priceDisplay || ''
  document.getElementById('fSize').value        = p?.size || ''
  document.getElementById('fWeight').value      = p?.weight || ''
  document.getElementById('fBodyType').value    = p?.bodyType || 'pano'
  document.getElementById('fDescription').value = p?.description || ''
  document.getElementById('fIncludes').value    = p?.includes || ''
  document.getElementById('fNotes').value       = p?.notes || ''
  document.getElementById('fAvailable').checked = p?.available !== false
  document.getElementById('fReadyStock').checked= p?.readyStock || false
  document.getElementById('fPhoto').value       = p?.photo || ''

  // photo preview
  const prev = document.getElementById('photoPreview')
  if (p?.photo) { prev.src = STORAGE_URL+'/'+p.photo; prev.classList.add('show'); document.getElementById('photoHint').style.display='none' }
  else { prev.classList.remove('show'); document.getElementById('photoHint').style.display='' }
  document.getElementById('photoName').textContent = p?.photo || ''

  // radio pills
  setRadios('sexGroup', p?.sex || 'Menina')
  setRadios('eyesGroup', p?.eyes || 'abertos')
  setRadios('hairGroup', p?.hair || 'pintado')

  document.getElementById('overlay').classList.add('open')
  document.getElementById('drawer').classList.add('open')
}

function setRadios(groupId, val) {
  document.querySelectorAll(`#${groupId} .radio-pill`).forEach(pill => {
    const isCheck = pill.dataset.val === val
    pill.classList.toggle('checked', isCheck)
    if (isCheck) pill.querySelector('input').checked = true
  })
}

document.querySelectorAll('.radio-pill').forEach(pill => {
  pill.addEventListener('click', () => {
    const group = pill.closest('.radio-group')
    group.querySelectorAll('.radio-pill').forEach(p=>p.classList.remove('checked'))
    pill.classList.add('checked')
    pill.querySelector('input').checked = true
  })
})

function closeDrawer() {
  document.getElementById('overlay').classList.remove('open')
  document.getElementById('drawer').classList.remove('open')
  document.getElementById('photoFile').value = ''
}

// ── PHOTO UPLOAD ──
async function handlePhotoSelect(input) {
  const file = input.files[0]
  if (!file) return

  // preview imediato
  const prev = document.getElementById('photoPreview')
  prev.src = URL.createObjectURL(file)
  prev.classList.add('show')
  document.getElementById('photoHint').style.display = 'none'
  document.getElementById('photoName').textContent = 'Enviando...'

  const form = new FormData()
  form.append('photo', file)
  try {
    const res = await fetch('/api/upload', { method:'POST', body:form })
    const data = await res.json()
    if (data.filename) {
      uploadedFilename = data.filename
      document.getElementById('fPhoto').value = data.filename
      document.getElementById('photoName').textContent = data.filename
      showToast('Foto enviada com sucesso!')
    } else {
      showToast('Erro ao enviar foto')
    }
  } catch {
    showToast('Erro ao enviar foto')
  }
}

// drag & drop
const drop = document.getElementById('photoDrop')
drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('drag') })
drop.addEventListener('dragleave', () => drop.classList.remove('drag'))
drop.addEventListener('drop', e => {
  e.preventDefault(); drop.classList.remove('drag')
  const file = e.dataTransfer.files[0]
  if (file && file.type.startsWith('image/')) {
    const dt = new DataTransfer(); dt.items.add(file)
    document.getElementById('photoFile').files = dt.files
    handlePhotoSelect(document.getElementById('photoFile'))
  }
})

// ── SAVE ──
async function saveProduct() {
  const id = document.getElementById('fId').value
  const name = document.getElementById('fName').value.trim()
  if (!name) { showToast('Informe o nome do produto'); return }

  const body = {
    name,
    category:     document.getElementById('fCategory').value,
    price:        parseFloat(document.getElementById('fPrice').value) || 0,
    priceDisplay: document.getElementById('fPriceDisplay').value.trim(),
    size:         document.getElementById('fSize').value.trim(),
    weight:       document.getElementById('fWeight').value.trim(),
    sex:          document.querySelector('#sexGroup .radio-pill.checked')?.dataset.val || 'Menina',
    bodyType:     document.getElementById('fBodyType').value,
    eyes:         document.querySelector('#eyesGroup .radio-pill.checked')?.dataset.val || 'abertos',
    hair:         document.querySelector('#hairGroup .radio-pill.checked')?.dataset.val || 'pintado',
    description:  document.getElementById('fDescription').value.trim(),
    includes:     document.getElementById('fIncludes').value.trim(),
    notes:        document.getElementById('fNotes').value.trim(),
    available:    document.getElementById('fAvailable').checked,
    readyStock:   document.getElementById('fReadyStock').checked,
    photo:        document.getElementById('fPhoto').value,
  }

  const btn = document.getElementById('saveBtn')
  btn.disabled = true; btn.textContent = 'Salvando...'

  try {
    const url = id ? `/api/catalog/${id}` : '/api/catalog'
    const method = id ? 'PUT' : 'POST'
    await fetch(url, { method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) })
    showToast(id ? 'Produto atualizado!' : 'Produto adicionado!')
    closeDrawer()
    await load()
  } catch {
    showToast('Erro ao salvar. Tente novamente.')
  } finally {
    btn.disabled = false; btn.textContent = 'Salvar produto'
  }
}

// ── DELETE ──
async function deleteProduct(id, name) {
  if (!confirm(`Excluir "${name}"? Esta ação não pode ser desfeita.`)) return
  await fetch(`/api/catalog/${id}`, { method:'DELETE' })
  showToast('Produto excluído')
  await load()
}

// ── TOAST ──
let toastTimer
function showToast(msg) {
  const t = document.getElementById('toast')
  t.textContent = msg
  t.classList.add('show')
  clearTimeout(toastTimer)
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000)
}

// ── ESC to close ──
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer() })

load()
</script>
</body>
</html>
